<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-size:60px;text-align:center;">

<div id="score">Loading...</div>

<script type="module">
import { listenScore } from "./firebase.js";

listenScore((data) => {
  if(data){
    document.getElementById("score").innerText =
      "Win: " + data.Win + " | Lose: " + data.Lose;
  }
});
</script>

</body>
</html>

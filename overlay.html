<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      background: transparent;
      color: white;
      font-size: 60px;
      font-family: Arial;
      text-align: center;

<body>

<div id="score">Loading...</div>

<script type="module">

});

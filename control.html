<!DOCTYPE html><html><head><meta charset="utf-8">
<style>body{font-family:Arial;padding:20px}button{font-size:28px;margin:8px;padding:12px 18px}</style></head><body>
<h2>Score Control</h2>
<button onclick="c('w',1)">+ WIN</button>
<button onclick="c('w',-1)">- WIN</button><br>
<button onclick="c('l',1)">+ LOSE</button>
<button onclick="c('l',-1)">- LOSE</button><br>
<button onclick="localStorage.w=0;localStorage.l=0">RESET</button>
<script>
if(!localStorage.w)localStorage.w=0;if(!localStorage.l)localStorage.l=0;
function c(k,d){let v=parseInt(localStorage[k]||0)+d;if(v<0)v=0;localStorage[k]=v;}
</script></body></html>
